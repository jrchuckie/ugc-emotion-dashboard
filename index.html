<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>鸣鸣很忙 UGC情绪看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0d14;color:#e2e8f0;font-family:'PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh}
.hd{background:linear-gradient(135deg,#1a1d2e,#0f1117);border-bottom:1px solid #2d3a5a;padding:18px 28px 14px;display:flex;align-items:flex-end;justify-content:space-between}
.hd h1{font-size:20px;font-weight:700;color:#e2e8f0}
.hd .sub{font-size:12px;color:#8892b0;margin-top:3px}
.hd-stats{display:flex;gap:28px}
.sv{font-size:22px;font-weight:700;color:#6366f1}
.sl{font-size:11px;color:#6b7280;margin-top:2px;text-align:right}
.tabs{display:flex;padding:14px 28px 0;border-bottom:1px solid #1e2438}
.tb{padding:9px 20px;border:none;background:transparent;color:#6b7280;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.tb:hover{color:#a5b4fc}
.tb.active{color:#818cf8;border-bottom-color:#6366f1;font-weight:600}
.tp{display:none;padding:22px 28px}
.tp.active{display:block}
.card{background:#1a1d2e;border-radius:12px;padding:18px 22px;border:1px solid #252a3f;margin-bottom:18px}
.ct{font-size:13px;font-weight:600;color:#a5b4fc;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row{display:flex;gap:18px}
.c2{flex:2;min-width:0}
.c1{flex:1;min-width:0}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pill{padding:4px 11px;border-radius:14px;font-size:12px;cursor:pointer;border:1px solid transparent;transition:all .15s;user-select:none}
.pill.pos{background:rgba(74,222,128,.12);color:#4ade80;border-color:rgba(74,222,128,.25)}
.pill.neg{background:rgba(248,113,113,.12);color:#f87171;border-color:rgba(248,113,113,.25)}
.pill.off{opacity:.28}
.pact-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.pact{padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;background:#252a3f;color:#8892b0;border:1px solid #2d3a5a}
.pact:hover{color:#a5b4fc;border-color:#6366f1}
.metrics{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.mc{flex:1;min-width:140px;background:#252a3f;border-radius:10px;padding:14px 18px;border:1px solid #2d3a5a}
.mv{font-size:26px;font-weight:700;color:#fbbf24}
.ml{font-size:11px;color:#6b7280;margin-top:3px}
.ms{font-size:11px;color:#4ade80;margin-top:2px}
.note-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.note-card{background:#252a3f;border-radius:8px;padding:10px 14px;border:1px solid #2d3a5a;display:flex;gap:10px;align-items:flex-start}
.ni{width:44px;height:44px;border-radius:6px;object-fit:cover;background:#1a1d2e;flex-shrink:0}
.nb{flex:1;min-width:0}
.nt{font-size:12px;color:#cbd5e1;line-height:1.5;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.nm{display:flex;gap:10px;font-size:11px;color:#6b7280}
.ne{color:#818cf8}
.nk{color:#fbbf24;text-decoration:none}
.nk:hover{text-decoration:underline}
.sbadge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(249,115,22,.1));border:1px solid rgba(251,191,36,.3);border-radius:16px;padding:3px 12px;font-size:11px;color:#fbbf24}
.mode-toggle{display:flex;border:1px solid #2d3a5a;border-radius:8px;overflow:hidden;width:fit-content}
.mt-btn{padding:5px 14px;font-size:12px;cursor:pointer;background:#252a3f;color:#6b7280;border:none;font-family:inherit;transition:all .15s}
.mt-btn.active{background:#6366f1;color:#fff}
</style>
</head>
<body>

<div class="hd">
  <div>
    <h1>🔥 鸣鸣很忙 UGC情绪看板</h1>
    <div class="sub">赵一鸣 · 零食很忙 · 鸣鸣很忙（合并）&nbsp;|&nbsp; 2025W49 → 2026W9 &nbsp;|&nbsp; 规则引擎 v4</div>
  </div>
  <div class="hd-stats">
    <div><div class="sv" id="s-total">-</div><div class="sl">有效打标笔记</div></div>
    <div><div class="sv" id="s-weeks">-</div><div class="sl">覆盖周次</div></div>
    <div><div class="sv" id="s-surprise">-</div><div class="sl">惊喜情绪占比</div></div>
    <div><div class="sv" id="s-pos">-</div><div class="sl">正面情绪占比</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tb active" onclick="go('t1',this)">📊 情绪分布</button>
  <button class="tb" onclick="go('t2',this)">⏱ 情绪 Over Time</button>
  <button class="tb" onclick="go('t3',this)">✨ 惊喜深挖</button>
</div>

<!-- Tab1 -->
<div id="t1" class="tp active">
  <div class="pact-row">
    <button class="pact" onclick="t1All()">全选</button>
    <button class="pact" onclick="t1Pos()">仅正面</button>
    <button class="pact" onclick="t1Neg()">仅负面</button>
  </div>
  <div class="pills" id="t1pills"></div>
  <div class="row">
    <div class="c2">
      <div class="card">
        <div class="ct">情绪分布（条数排序）</div>
        <div id="t1bar" style="height:500px"></div>
      </div>
    </div>
    <div class="c1">
      <div class="card">
        <div class="ct">正/负极性分布</div>
        <div id="t1donut" style="height:220px"></div>
      </div>
      <div class="card">
        <div class="ct">周次笔记量趋势</div>
        <div id="t1week" style="height:200px"></div>
      </div>
    </div>
  </div>
</div>

<!-- Tab2 -->
<div id="t2" class="tp">
  <div class="card" style="margin-bottom:14px">
    <div class="ct">选择要展示的情绪 <span style="color:#6b7280;font-size:11px;font-weight:400">（可多选，上限8个）</span></div>
    <div class="pact-row">
      <button class="pact" onclick="t2Preset('top5pos')">Top5正面</button>
      <button class="pact" onclick="t2Preset('top5neg')">Top5负面</button>
      <button class="pact" onclick="t2Preset('surprise')">仅惊喜</button>
      <button class="pact" onclick="t2Preset('all')">Top8</button>
      <span style="font-size:11px;color:#6b7280;margin-left:4px">已选：<span id="t2count" style="color:#818cf8">0</span>/8</span>
    </div>
    <div class="pills" id="t2pills"></div>
  </div>
  <div class="card">
    <div class="ct" style="justify-content:space-between">
      <span>各情绪趋势（周维度）</span>
      <div class="mode-toggle">
        <button class="mt-btn active" id="modeCount" onclick="setMode('count')">条数</button>
        <button class="mt-btn" id="modeRate" onclick="setMode('rate')">占比 %</button>
      </div>
    </div>
    <div id="t2line" style="height:360px"></div>
  </div>
  <div class="card">
    <div class="ct">全情绪 × 周次 热力图（占比 %）</div>
    <div id="t2heat" style="height:440px"></div>
  </div>
</div>

<!-- Tab3 -->
<div id="t3" class="tp">
  <div class="metrics" id="t3metrics"></div>
  <div class="row">
    <div class="c2">
      <div class="card">
        <div class="ct">
          惊喜情绪量 over time
          <span class="sbadge">✨ 含被投喂·抽奖·中奖·超预期</span>
        </div>
        <div id="t3bar" style="height:260px"></div>
      </div>
      <div class="card">
        <div class="ct">惊喜情绪率 (%) over time</div>
        <div id="t3rate" style="height:220px"></div>
      </div>
    </div>
    <div class="c1">
      <div class="card">
        <div class="ct">🎁 惊喜代表笔记 Top5（按曝光）</div>
        <div class="note-list" id="t3notes"></div>
      </div>
    </div>
  </div>
</div>

<script>

var D=window.__D;
var POS=window.__POS;
var NEG=window.__NEG;

var WEEKS=D.meta.weeks;
var WL=WEEKS.map(function(w){return w.replace('20','').replace('年第','W').replace('周','');});
var EMOTIONS=D.overview.top_emotions;
var DIST=D.overview.emotion_dist;

var EM_COLORS=['#6366f1','#f59e0b','#10b981','#f87171','#4ade80','#38bdf8','#e879f9','#fb923c','#34d399','#a78bfa','#fbbf24','#60a5fa','#f472b6','#c084fc','#818cf8'];

function isPos(e){return POS.indexOf(e)>=0;}
function isNeg(e){return NEG.indexOf(e)>=0;}
function ec(e){return isPos(e)?'#4ade80':isNeg(e)?'#f87171':'#94a3b8';}
function fmt(n){return n>=10000?(n/10000).toFixed(1)+'w':String(n);}
function getOrInit(id,theme){
  var el=document.getElementById(id);
  return echarts.getInstanceByDom(el)||echarts.init(el,theme||'dark');
}

// ── Tab router ──
function go(id,btn){
  document.querySelectorAll('.tp').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.tb').forEach(function(el){el.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  setTimeout(function(){
    if(id==='t1')renderT1();
    if(id==='t2')renderT2();
    if(id==='t3')renderT3();
  },50);
}

// ── Stats ──
function initStats(){
  var tot=D.meta.total_notes;
  document.getElementById('s-total').textContent=tot.toLocaleString();
  document.getElementById('s-weeks').textContent=WEEKS.length+'周';
  var sc=DIST['惊喜']||0;
  document.getElementById('s-surprise').textContent=(sc/tot*100).toFixed(1)+'%';
  var pc=D.overview.polarity_dist['正面']||0;
  document.getElementById('s-pos').textContent=(pc/tot*100).toFixed(1)+'%';
}

// ══════════════════════════════════════════════════════
// Tab1: 情绪分布
// ══════════════════════════════════════════════════════
var t1sel=EMOTIONS.slice();// all selected

function t1Pills(){
  var c=document.getElementById('t1pills');
  c.innerHTML=EMOTIONS.map(function(e){
    var on=t1sel.indexOf(e)>=0;
    return '<span class="pill '+(isPos(e)?'pos':'neg')+' '+(on?'':'off')+'" onclick="t1Toggle(\''+e+'\')">'+e+'</span>';
  }).join('');
}
function t1Toggle(e){
  var i=t1sel.indexOf(e);
  if(i>=0)t1sel.splice(i,1); else t1sel.push(e);
  t1Pills();t1Bar();
}
function t1All(){t1sel=EMOTIONS.slice();t1Pills();t1Bar();}
function t1Pos(){t1sel=EMOTIONS.filter(isPos);t1Pills();t1Bar();}
function t1Neg(){t1sel=EMOTIONS.filter(isNeg);t1Pills();t1Bar();}

function t1Bar(){
  var ch=getOrInit('t1bar');
  var es=EMOTIONS.filter(function(e){return t1sel.indexOf(e)>=0;})
    .sort(function(a,b){return (DIST[b]||0)-(DIST[a]||0);});
  ch.setOption({
    backgroundColor:'transparent',
    grid:{left:80,right:70,top:10,bottom:30},
    xAxis:{type:'value',axisLabel:{color:'#6b7280',fontSize:11},splitLine:{lineStyle:{color:'#1e2438'}}},
    yAxis:{type:'category',data:es,axisLabel:{color:'#e2e8f0',fontSize:12},axisLine:{lineStyle:{color:'#2d3a5a'}}},
    tooltip:{trigger:'axis',formatter:function(p){return p[0].name+': '+p[0].value+' 条';}},
    series:[{type:'bar',barMaxWidth:26,
      data:es.map(function(e){return {value:DIST[e]||0,itemStyle:{color:ec(e),borderRadius:[0,3,3,0]}};}),
      label:{show:true,position:'right',color:'#94a3b8',fontSize:11}
    }]
  },true);
}

function t1Donut(){
  var ch=getOrInit('t1donut');
  var pol=D.overview.polarity_dist;
  ch.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'item',formatter:'{b}: {c} ({d}%)'},
    legend:{bottom:0,textStyle:{color:'#8892b0',fontSize:11}},
    series:[{type:'pie',radius:['48%','72%'],center:['50%','44%'],
      label:{show:true,color:'#e2e8f0',fontSize:12,formatter:'{b}\n{d}%'},
      data:[
        {name:'正面',value:pol['正面']||0,itemStyle:{color:'#4ade80'}},
        {name:'负面',value:pol['负面']||0,itemStyle:{color:'#f87171'}},
        {name:'混合',value:pol['混合']||0,itemStyle:{color:'#94a3b8'}},
      ]
    }]
  });
}

function t1Week(){
  var ch=getOrInit('t1week');
  var wt=D.week_total;
  ch.setOption({
    backgroundColor:'transparent',
    grid:{left:40,right:10,top:10,bottom:54},
    tooltip:{trigger:'axis'},
    xAxis:{type:'category',data:WL,axisLabel:{color:'#6b7280',fontSize:10,rotate:35}},
    yAxis:{type:'value',axisLabel:{color:'#6b7280',fontSize:11},splitLine:{lineStyle:{color:'#1e2438'}}},
    series:[{type:'bar',data:WEEKS.map(function(w){return wt[w]||0;}),barMaxWidth:22,
      itemStyle:{color:'rgba(99,102,241,.5)',borderRadius:[3,3,0,0]}
    }]
  });
}

function renderT1(){t1Pills();t1Bar();t1Donut();t1Week();}

// ══════════════════════════════════════════════════════
// Tab2: 情绪 Over Time
// ══════════════════════════════════════════════════════
var t2sel=['惊喜','愉悦','好感','失望','遗憾'];
var t2mode='count';
var MAX_SEL=8;

function t2Pills(){
  var c=document.getElementById('t2pills');
  c.innerHTML=EMOTIONS.map(function(e){
    var on=t2sel.indexOf(e)>=0;
    return '<span class="pill '+(isPos(e)?'pos':'neg')+' '+(on?'':'off')+'" onclick="t2Toggle(\''+e+'\')">'+e+'</span>';
  }).join('');
  document.getElementById('t2count').textContent=t2sel.length;
}

function t2Toggle(e){
  var i=t2sel.indexOf(e);
  if(i>=0){t2sel.splice(i,1);}
  else if(t2sel.length<MAX_SEL){t2sel.push(e);}
  t2Pills();t2Line();t2Heat();
}

function t2Preset(p){
  if(p==='top5pos'){t2sel=EMOTIONS.filter(isPos).slice(0,5);}
  else if(p==='top5neg'){t2sel=EMOTIONS.filter(isNeg).slice(0,5);}
  else if(p==='surprise'){t2sel=['惊喜'];}
  else{t2sel=EMOTIONS.slice(0,8);}
  t2Pills();t2Line();t2Heat();
}

function setMode(m){
  t2mode=m;
  document.getElementById('modeCount').classList.toggle('active',m==='count');
  document.getElementById('modeRate').classList.toggle('active',m==='rate');
  t2Line();
}

function t2Line(){
  var ch=getOrInit('t2line');

    backgroundColor:'transparent',
    grid:{left:50,right:20,top:30,bottom:60},
    tooltip:{
      trigger:'axis',
      formatter:function(params){
        var w=WEEKS[params[0].dataIndex];

          return p.seriesName+': '+p.value+(isRate?'%':' 条');
        }).join('<br>');
      }
    },
    legend:{bottom:0,textStyle:{color:'#8892b0',fontSize:11},type:'scroll'},
    xAxis:{type:'category',data:WL,axisLabel:{color:'#6b7280',fontSize:11,rotate:30},axisLine:{lineStyle:{color:'#2d3a5a'}}},
    yAxis:{type:'value',
      axisLabel:{color:'#6b7280',fontSize:11,formatter:function(v){return isRate?v+'%':v;}},
      splitLine:{lineStyle:{color:'#1e2438'}}},
    series:t2sel.map(function(e,i){
      var eot=D.emotion_over_time[e]||{};
      var vals=isRate?(eot.rates||WEEKS.map(function(){return 0;})):(eot.counts||WEEKS.map(function(){return 0;}));
      return {
        name:e,type:'line',
        data:vals,
        lineStyle:{color:EM_COLORS[i%EM_COLORS.length],width:2},
        itemStyle:{color:EM_COLORS[i%EM_COLORS.length]},
        symbol:'circle',symbolSize:5,smooth:false,
      };
    })
  },true);
}

function t2Heat(){
  var ch=getOrInit('t2heat');
  var allE=EMOTIONS;
  var data=[];
  var maxV=0;
  allE.forEach(function(e,ei){
    WEEKS.forEach(function(w,wi){
      var wt=D.week_total[w]||1;
      var cnt=(D.week_emotion[w]&&D.week_emotion[w][e])||0;
      var rate=+(cnt/wt*100).toFixed(1);
      data.push([wi,ei,rate]);
      if(rate>maxV)maxV=rate;
    });
  });
  ch.setOption({
    backgroundColor:'transparent',
    grid:{left:80,right:90,top:10,bottom:70},
    xAxis:{type:'category',data:WL,
      axisLabel:{color:'#8892b0',fontSize:10,rotate:30},
      splitArea:{show:true,areaStyle:{color:['#1a1d2e','#252a3f']}}},
    yAxis:{type:'category',data:allE,
      axisLabel:{color:'#e2e8f0',fontSize:11},
      splitArea:{show:true}},
    visualMap:{min:0,max:maxV,calculable:true,
      inRange:{color:['#1a1d2e','#1e3a5f','#1d4ed8','#6366f1','#a78bfa']},
      textStyle:{color:'#8892b0'},right:0,top:'center',itemHeight:150},
    tooltip:{formatter:function(p){
      return allE[p.data[1]]+' | '+WL[p.data[0]]+'<br>占比: '+p.data[2]+'%';
    }},
    series:[{type:'heatmap',data:data,
      label:{show:true,color:'#fff',fontSize:9,
        formatter:function(p){return p.data[2]>0?p.data[2]+'%':'';}
      }
    }]
  });
}

function renderT2(){t2Pills();t2Line();t2Heat();}

// ══════════════════════════════════════════════════════
// Tab3: 惊喜深挖
// ══════════════════════════════════════════════════════
function renderT3(){
  var eot=D.emotion_over_time['惊喜']||{};
  var counts=eot.counts||WEEKS.map(function(){return 0;});
  var rates=eot.rates||WEEKS.map(function(){return 0;});
  var total=counts.reduce(function(a,c){return a+c;},0);
  var avgRate=(rates.reduce(function(a,c){return a+c;},0)/rates.length).toFixed(1);
  var maxVal=Math.max.apply(null,rates);
  var maxRate=maxVal.toFixed(1);
  var maxWeek=WL[rates.indexOf(maxVal)];

  document.getElementById('t3metrics').innerHTML=
    '<div class="mc"><div class="mv">'+total+'</div><div class="ml">惊喜情绪笔记总量</div></div>'+
    '<div class="mc"><div class="mv">'+avgRate+'%</div><div class="ml">平均惊喜率（各周均值）</div></div>'+
    '<div class="mc"><div class="mv" style="color:#f87171">'+maxRate+'%</div><div class="ml">峰值惊喜率</div><div class="ms">'+maxWeek+'</div></div>'+
    '<div class="mc"><div class="mv" style="color:#10b981">'+((DIST['惊喜']||0)/D.meta.total_notes*100).toFixed(1)+'%</div><div class="ml">全期惊喜占比</div></div>';

  // 柱图
  var bc=getOrInit('t3bar');
  var maxC=Math.max.apply(null,counts);
  bc.setOption({
    backgroundColor:'transparent',
    grid:{left:40,right:20,top:20,bottom:60},
    tooltip:{trigger:'axis',formatter:function(p){return WEEKS[p[0].dataIndex]+'<br>惊喜: '+p[0].value+' 条';}},
    xAxis:{type:'category',data:WL,axisLabel:{color:'#6b7280',fontSize:10,rotate:35}},
    yAxis:{type:'value',axisLabel:{color:'#6b7280',fontSize:11},splitLine:{lineStyle:{color:'#1e2438'}}},
    series:[{type:'bar',barMaxWidth:30,
      data:counts.map(function(v){
        return {value:v,itemStyle:{color:v===maxC?'#fbbf24':'rgba(99,102,241,.7)',borderRadius:[3,3,0,0]}};
      }),
      markPoint:{data:[{type:'max',label:{color:'#fff',fontSize:10}}],itemStyle:{color:'#fbbf24'}}
    }]
  });

  // 率折线
  var rc=getOrInit('t3rate');
  rc.setOption({
    backgroundColor:'transparent',
    grid:{left:45,right:20,top:15,bottom:60},
    tooltip:{trigger:'axis',formatter:function(p){return WEEKS[p[0].dataIndex]+'<br>惊喜率: '+p[0].value+'%';}},
    xAxis:{type:'category',data:WL,axisLabel:{color:'#6b7280',fontSize:10,rotate:35}},
    yAxis:{type:'value',axisLabel:{color:'#6b7280',fontSize:11,formatter:function(v){return v+'%';}},splitLine:{lineStyle:{color:'#1e2438'}}},
    series:[{type:'line',data:rates,
      lineStyle:{color:'#fbbf24',width:2.5},
      itemStyle:{color:'#fbbf24'},
      areaStyle:{color:'rgba(251,191,36,.15)'},
      symbol:'circle',symbolSize:6,smooth:false,
    }]
  });

  // 代表笔记
  var notes=D.surprise_notes||[];
  document.getElementById('t3notes').innerHTML=notes.map(function(n){
    return '<div class="note-card">'+
      '<img class="ni" src="'+(n.image_url||'')+'" onerror="this.style.display=\'none\'"/>'+
      '<div class="nb">'+
        '<div class="nt">'+(n.text||'')+'</div>'+
        '<div class="nm">'+
          '<span class="ne">曝光 '+fmt(n.exposure||0)+'</span>'+
          '<span>'+(n.week||'')+'</span>'+
          '<a class="nk" href="'+(n.note_url||'#')+'" target="_blank">→ 原文</a>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ── resize ──
window.addEventListener('resize',function(){
  ['t1bar','t1donut','t1week','t2line','t2heat','t3bar','t3rate'].forEach(function(id){
    var el=document.getElementById(id);
    if(el){var c=echarts.getInstanceByDom(el);if(c)c.resize();}
  });
});

// ── boot ──
initStats();
renderT1();

</script>
</body>
